<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .laser-sweep-active {
            position: relative;
            overflow: hidden;
        }
        .laser-sweep-active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff9159, transparent);
            animation: sweep 3s infinite linear;
        }
        @keyframes sweep {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .cosmic-bg {
            background: radial-gradient(circle at 50% 50%, #1a1919 0%, #0e0e0e 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }
        .star-field {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #00eefc, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #ff9159, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.2;
        }
        .pedestal-glow {
            filter: drop-shadow(0 0 20px rgba(0, 238, 252, 0.3));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen">
<!-- Cosmic Background Layers -->
<div class="cosmic-bg">
<div class="star-field"></div>
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_80%_20%,rgba(255,145,89,0.05)_0%,transparent_50%)]"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-neutral-900/70 backdrop-blur-xl laser-sweep-active">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-orange-500" data-icon="menu_open">menu_open</span>
<h1 class="font-headline tracking-widest text-orange-500 text-xl font-bold uppercase">VOLT_AESTHETIC</h1>
</div>
<div class="flex items-center gap-6">
<nav class="hidden md:flex gap-8">
<a class="font-headline text-orange-500 drop-shadow-[0_0_8px_rgba(255,107,0,0.6)] tracking-tighter uppercase text-sm" href="#">Hangar</a>
<a class="font-headline text-neutral-500 hover:bg-white/5 transition-all duration-300 tracking-tighter uppercase text-sm" href="#">Tech Lab</a>
<a class="font-headline text-neutral-500 hover:bg-white/5 transition-all duration-300 tracking-tighter uppercase text-sm" href="#">Telemetry</a>
</nav>
<div class="w-10 h-10 rounded-full bg-surface-container-highest border border-outline-variant overflow-hidden">
<img alt="User Profile" data-alt="close-up portrait of a high-tech digital avatar with orange glowing circuit patterns on skin and sharp industrial features" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDy0jGN3_RRKFu0U9Nr12J2iXszggSViLd1DPF81cblcnEU06jRYlNIhuqGrSPZ6nJjS-1bGaZscMZowloEB3lun6GfaJ5hwwpcuLrZawi-8uWbLGWRj98zVCS0QYrZBQ83d54G-2TOeO_KR0ADJQSmNJSzpw-7ZtJPlrkiANDfQcT6JXlsReChqw8_IWGLiCBCKLGZfIWBH4y-kk3NghkIqhR2D3G3kZrqr492jrIgJE9qM2tpllnthh4sC4Cgjn5mIpJ77bPB03xX"/>
</div>
</div>
</header>

<!-- Left: Technical Specs (Glassmorphism) -->
<section class="lg:col-span-3 order-2 lg:order-1 space-y-6">
<div class="bg-surface-container/60 backdrop-blur-2xl rounded-xl p-6 border-l-4 border-primary shadow-2xl">
<h2 class="font-headline text-sm tracking-[0.2em] text-on-surface-variant uppercase mb-4">Unit Configuration</h2>
<div class="space-y-6">
<div class="flex items-center justify-between">
<div>
<p class="text-[10px] uppercase tracking-widest text-secondary font-headline">Core Engine</p>
<p class="text-2xl font-headline font-bold">V12 HYBRID</p>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="settings_input_component">settings_input_component</span>
</div>
<div class="flex items-center justify-between">
<div>
<p class="text-[10px] uppercase tracking-widest text-secondary font-headline">Output Capacity</p>
<p class="text-2xl font-headline font-bold">600HP <span class="text-sm font-normal text-on-surface-variant">/ 447KW</span></p>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="bolt">bolt</span>
</div>
<div class="pt-4 border-t border-outline-variant/30">
<div class="flex justify-between mb-2">
<span class="text-[10px] uppercase tracking-widest font-headline">Sync Integrity</span>
<span class="text-[10px] uppercase tracking-widest font-headline text-secondary">98.4%</span>
</div>
<div class="h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-secondary w-[98.4%] shadow-[0_0_8px_#00eefc]"></div>
</div>
</div>
</div>
</div>
<!-- Neumorphic Color Selection -->
<div class="bg-surface-container-low rounded-xl p-6">
<h2 class="font-headline text-sm tracking-[0.2em] text-on-surface-variant uppercase mb-4">Chroma Selection</h2>
<div class="grid grid-cols-4 gap-4">
<button class="aspect-square rounded-lg bg-red-600 shadow-[4px_4px_10px_rgba(0,0,0,0.5),-2px_-2px_6px_rgba(255,255,255,0.05)] border-2 border-transparent hover:border-white/20 transition-all"></button>
<button class="aspect-square rounded-lg bg-blue-600 shadow-[4px_4px_10px_rgba(0,0,0,0.5),-2px_-2px_6px_rgba(255,255,255,0.05)] border-2 border-primary shadow-[0_0_15px_rgba(255,145,89,0.4)] transition-all"></button>
<button class="aspect-square rounded-lg bg-neutral-900 shadow-[4px_4px_10px_rgba(0,0,0,0.5),-2px_-2px_6px_rgba(255,255,255,0.05)] border-2 border-transparent hover:border-white/20 transition-all"></button>

</div>
<p class="text-center mt-4 text-[10px] font-headline tracking-widest text-on-surface-variant uppercase">Current: Cobalt Flare</p>
</div>
</section>
<!-- Center: 3D Car & Pedestal -->

<div class="absolute bottom-6 w-3/4 h-4 bg-gradient-to-r from-transparent via-secondary/20 to-transparent rounded-full animate-pulse"></div>
<!-- Placeholder for 3D Car Image -->

<img alt="Luxury 3D Car" class="drop-shadow-[0_25px_50px_rgba(0,0,0,0.8)]" data-alt="a sleek futuristic electric supercar in metallic cobalt blue floating on a dark industrial pedestal, 3/4 view, cinematic lighting with neon accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGfB1rbfTzTYM1bP3HUtSfJQoWjg67i0snAIHJaR0iaDsQgd7Qa7Zxy-vj4OtkCmhKL9QV51lDHghVfPMlxAUoUhNpKSAUThNuMCr3-ROe5dwPt5EfXW8E5fdwEFP-ZpXPLBJ3Ai2EYV8KqeyYeMgfb8OC_6oTRx8slAoBCjdK0AEHC_V3IynhwtYgyDfH1cTL1GlQ3gFI7V7BdrC6d-gtRS7riYUhrg_2zEF3CuZY23zOk5BJ4IEvE0ZMld_ogxRRqYEfn0ZzhZ5L"/>
</div>
</div>
<!-- Rotate Action -->
<button class="mt-8 group relative flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-full flex items-center justify-center bg-surface-container-highest text-primary border border-primary/30 shadow-[0_0_20px_rgba(255,145,89,0.2)] group-hover:shadow-[0_0_30px_rgba(255,145,89,0.5)] transition-all duration-300">
<span class="material-symbols-outlined text-3xl" data-icon="3d_rotation">3d_rotation</span>
</div>
<span class="font-headline text-[10px] tracking-[0.4em] uppercase text-primary font-bold">Initiate Rotation</span>
</button>
</section>
<!-- Right: Status Gauges -->
<section class="lg:col-span-3 order-3 space-y-8">
<div class="bg-surface-container-high/40 rounded-xl p-6 border border-outline-variant/10">
<h2 class="font-headline text-sm tracking-[0.2em] text-on-surface-variant uppercase mb-8 text-right">System Metrics</h2>
<div class="space-y-12">
<!-- Gauge 1 -->

</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">

<span class="text-[8px] uppercase tracking-widest text-on-surface-variant">Aero Coeff</span>
</div>
</div>
</div>
<!-- Gauge 2 -->
<div class="relative flex flex-col items-center lg:items-end">
<div class="relative w-32 h-32">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-surface-container-highest" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary drop-shadow-[0_0_8px_rgba(255,145,89,0.6)]" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-dasharray="364.4" stroke-dashoffset="109.3" stroke-width="4"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-headline text-2xl font-bold">70%</span>
<span class="text-[8px] uppercase tracking-widest text-on-surface-variant">Power Flux</span>
</div>
</div>
</div>
</div>
</div>
<!-- Finalize CTA -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary-fixed font-headline font-bold uppercase tracking-[0.2em] rounded-lg shadow-[0_10px_20px_rgba(255,122,47,0.3)] hover:brightness-110 transition-all active:scale-95">

</button>
<button class="flex items-center justify-center bg-orange-600/20 text-orange-500 rounded-full p-4 shadow-[0_0_15px_rgba(255,107,0,0.4)]">

<button class="flex items-center justify-center text-neutral-400 p-4 hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</button>
<button class="flex items-center justify-center text-neutral-400 p-4 hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="settings_input_component">settings_input_component</span>
