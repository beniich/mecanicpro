apiVersion: v1
kind: Service
metadata:
  name: api-monolith
spec:
  ports:
    - port: 8080
  selector:
    app: api-monolith
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-monolith
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-monolith
  template:
    metadata:
      labels:
        app: api-monolith
    spec:
      containers:
        - name: api-monolith
          image: mecapro/api-monolith:latest
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ConnectionStrings__DefaultConnection
              value: "Server=sqlserver;Database=MecaPro_AppDb;User Id=sa;Password=YourStrong@Password;TrustServerCertificate=True"
            - name: ConnectionStrings__Redis
              value: "redis:6379"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: mecapro/gateway:latest
          env:
            - name: ReverseProxy__Clusters__monolith-cluster__Destinations__monolith__Address
              value: "http://api-monolith:8080"
          ports:
            - containerPort: 8080
