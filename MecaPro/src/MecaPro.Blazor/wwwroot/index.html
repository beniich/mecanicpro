<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MecaPro — Atelier Intelligent</title>
    <meta name="description" content="MecaPro — Logiciel de gestion d'atelier mécanique automobile professionnel." />
    <base href="/" />

    <!-- Polices Google — Inter (body), Outfit (headlines), JetBrains Mono (technique) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              /* Peach/Coral brand from image */
              'brand': { DEFAULT:'#ED8A67','50':'#FEF3F1','100':'#FDE7E3','200':'#FBCAC1','300':'#F9AD9F','400':'#F78F7D','500':'#ED8A67','600':'#D67455','700':'#B36147','800':'#8F4E39','900':'#613527' },
              /* Refined High-End Tokens */
              'primary':                   '#ED8A67',
              'primary-container':         '#FBD5C5',
              'secondary-container':       '#2A3342',
              'surface':                   '#111827',
              'surface-container':         '#1F2937',
              'surface-container-low':     '#111827',
              'surface-container-high':    '#374151',
              'surface-container-highest': '#4B5563',
              'on-surface':                '#F9FAFB',
              'on-surface-variant':        '#9CA3AF',
              'outline-variant':           '#374151',
              'background':                '#0F172A',
            },
            fontFamily: {
              sans:      ['Inter', 'system-ui', 'sans-serif'],
              headline:  ['Outfit', 'Inter', 'sans-serif'],
              body:      ['Inter', 'sans-serif'],
              technical: ['JetBrains Mono', 'monospace'],
            },
            borderRadius: {
              'DEFAULT': '0.5rem', 'md':'0.5rem', 'lg':'0.75rem', 'xl':'1rem',
              '2xl':'1.25rem', '3xl':'1.5rem', '4xl':'2rem', 'full':'9999px',
            },
          },
        },
      }
    </script>

    <style>
      /* ─── Base ─── */
      *, *::before, *::after { box-sizing: border-box; }
      html { -webkit-font-smoothing: antialiased; }
      body { font-family: 'Inter', system-ui, sans-serif; }

      /* ─── Material Symbols ─── */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle; user-select: none;
      }
      .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

      /* ─── Fonts ─── */
      .headline-font  { font-family: 'Outfit', sans-serif; }
      .font-technical { font-family: 'JetBrains Mono', monospace; }

      /* ─── Scrollbar ─── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(237,138,103,.3); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(237,138,103,.5); }

      /* ─── Plate badge ─── */
      .plate {
        font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
        padding: 0.15rem 0.5rem; background: rgba(237,138,103,.08); color: #ED8A67;
        border: 1px solid rgba(237,138,103,.2); border-radius: 0.375rem; letter-spacing: 0.04em;
      }
      .dark .plate { background: rgba(237,138,103,.12); color: #F78F7D; border-color: rgba(237,138,103,.25); }

      /* ─── Status Badges ─── */
      .badge { display:inline-flex; align-items:center; gap:0.35rem; font-size:0.7rem; font-weight:600; padding:0.2rem 0.6rem; border-radius:99px; border-width:1px; }
      .badge-ok    { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
      .badge-warn  { background:#fffbeb; color:#b45309; border-color:#fde68a; }
      .badge-error { background:#fef2f2; color:#b91c1c; border-color:#fecaca; }
      .badge-info  { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
      .badge-idle  { background:#f9fafb; color:#6b7280; border-color:#e5e7eb; }
      .dark .badge-ok    { background:rgba(34,197,94,.08);   color:#4ade80; border-color:rgba(34,197,94,.25); }
      .dark .badge-warn  { background:rgba(245,158,11,.08);  color:#fbbf24; border-color:rgba(245,158,11,.25); }
      .dark .badge-error { background:rgba(239,68,68,.08);   color:#f87171; border-color:rgba(239,68,68,.25); }
      .dark .badge-info  { background:rgba(59,130,246,.08);  color:#60a5fa; border-color:rgba(59,130,246,.25); }
      .dark .badge-idle  { background:rgba(107,114,128,.08); color:#9ca3af; border-color:rgba(107,114,128,.25); }

      /* ─── Progress tracks ─── */
      .progress-track { height:6px; background:#e5e7eb; border-radius:99px; overflow:hidden; }
      .dark .progress-track { background:#374151; }
      .progress-fill { height:100%; border-radius:99px; transition:width 0.4s ease; }
      .progress-amber { background:#ED8A67; }
      .progress-green { background:#10B981; }
      .progress-blue  { background:#3B82F6; }
      .progress-purple{ background:#8B5CF6; }

      /* ─── Cards ─── */
      .mp-card {
        background:#fff; border:1px solid #e5e7eb; border-radius:1rem;
        transition: box-shadow 0.15s, border-color 0.15s;
      }
      .mp-card:hover { box-shadow:0 4px 20px rgba(0,0,0,.07); }
      .dark .mp-card { background:#1f2937; border-color:#374151; }
      .dark .mp-card:hover { box-shadow:0 4px 20px rgba(0,0,0,.4); }

      /* ─── Tab pill ─── */
      .tab-nav { display:flex; gap:0.25rem; background:#f3f4f6; border-radius:0.875rem; padding:0.25rem; }
      .dark .tab-nav { background:#1f2937; }
      .tab-btn {
        padding:0.5rem 1rem; font-size:0.8125rem; font-weight:500; border-radius:0.625rem;
        transition:all 0.15s; color:#6b7280; cursor:pointer; border:none; background:transparent;
      }
      .tab-btn:hover { color:#111827; }
      .tab-btn.active { background:#fff; color:#111827; box-shadow:0 1px 4px rgba(0,0,0,.1); }
      .dark .tab-btn { color:#9ca3af; }
      .dark .tab-btn:hover { color:#f9fafb; }
      .dark .tab-btn.active { background:#111827; color:#f9fafb; }

      /* ─── KPI card ─── */
      .kpi-card {
        background:#fff; border:1px solid #e5e7eb; border-radius:0.75rem; padding:1rem;
        display:flex; align-items:flex-start; gap:0.75rem;
      }
      .dark .kpi-card { background:#1f2937; border-color:#374151; }
      .kpi-icon { width:2.25rem; height:2.25rem; border-radius:0.5rem; background:#f3f4f6; display:flex; align-items:center; justify-content:center; font-size:1.125rem; flex-shrink:0; }
      .dark .kpi-icon { background:#374151; }

      /* ─── Service grid cards ─── */
      .service-card {
        display:flex; flex-direction:column; align-items:center; gap:0.5rem;
        padding:0.75rem 0.5rem; border-radius:0.75rem; border:1px solid #e5e7eb;
        background:#fff; cursor:pointer; text-align:center; transition:all 0.15s;
      }
      .service-card:hover { border-color:#FBCAC1; box-shadow:0 2px 10px rgba(237,138,103,0.12); }
      .service-card.selected { border-color:#ED8A67; background:#FEF3F1; }
      .dark .service-card { background:#1f2937; border-color:#374151; }
      .dark .service-card:hover { border-color:#ED8A67; }
      .dark .service-card.selected { border-color:#ED8A67; background:rgba(237,138,103,0.08); }

      /* ─── Data tables ─── */
      .mp-table { width:100%; border-collapse:collapse; font-size:0.8125rem; }
      .mp-table thead tr { border-bottom:1px solid #e5e7eb; }
      .dark .mp-table thead tr { border-bottom-color:#374151; }
      .mp-table th { padding:0.75rem 1rem; text-align:left; font-size:0.675rem; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:#9ca3af; }
      .mp-table td { padding:0.875rem 1rem; color:#374151; vertical-align:middle; }
      .dark .mp-table td { color:#d1d5db; }
      .mp-table tbody tr { border-bottom:1px solid #f3f4f6; transition:background 0.1s; }
      .dark .mp-table tbody tr { border-bottom-color:#1f2937; }
      .mp-table tbody tr:hover { background:#fafafa; }
      .dark .mp-table tbody tr:hover { background:rgba(55,65,81,.4); }

      /* ─── Btn primaire brand ─── */
      .btn-brand {
        display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem;
        background:#ED8A67; color:#fff; font-size:0.875rem; font-weight:600;
        border-radius:0.625rem; border:none; cursor:pointer; transition:background 0.15s;
      }
      .btn-brand:hover { background:#D67455; }
      .btn-ghost {
        display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem;
        background:transparent; color:#6b7280; font-size:0.875rem; font-weight:500;
        border-radius:0.625rem; border:1px solid #e5e7eb; cursor:pointer; transition:all 0.15s;
      }
      .btn-ghost:hover { color:#111827; border-color:#9ca3af; }
      .dark .btn-ghost { color:#9ca3af; border-color:#374151; }
      .dark .btn-ghost:hover { color:#f9fafb; border-color:#6b7280; }

      /* ─── Spinner / Loading ─── */
      @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
      .spinner { width:2rem; height:2rem; border:3px solid rgba(237,138,103,0.15); border-top-color:#ED8A67; border-radius:50%; animation:spin 0.75s linear infinite; }

      /* ─── Section header ─── */
      .section-header { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:1.5rem; }
      .section-title { font-family:'Outfit',sans-serif; font-size:1.125rem; font-weight:700; color:#111827; }
      .dark .section-title { color:#f9fafb; }
      .section-sub { font-size:0.8125rem; color:#6b7280; margin-top:0.125rem; }
      .dark .section-sub { color:#9ca3af; }

      /* Bento legacy compat */
      .bento-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:1.5rem; }
      .text-shadow-glow { text-shadow:0 0 12px rgba(245,166,35,.3); }
    </style>

    <link rel="stylesheet" href="css/mecapro.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MecaPro.Blazor.styles.css" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div id="splash" style="position:fixed;inset:0;background:#0F172A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
            <div style="width:52px;height:52px;border:3px solid rgba(237,138,103,.12);border-top-color:#ED8A67;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:1.5rem;"></div>
            <p style="font-family:'Outfit',sans-serif;font-size:2.25rem;font-weight:800;letter-spacing:0.15em;color:#ED8A67;margin:0;text-transform:uppercase;">MECAPRO</p>
            <p style="font-family:'Inter',sans-serif;font-size:0.7rem;color:#9CA3AF;letter-spacing:0.12em;margin-top:0.5rem;text-transform:uppercase;">Chargement du système...</p>
            <style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>
        </div>
    </div>
    <script>
      document.addEventListener('blazor:initialized', () => {
        const s = document.getElementById('splash');
        if (s) { s.style.opacity = '0'; s.style.transition = 'opacity 0.3s'; setTimeout(() => s.remove(), 350); }
      });
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>
</html>
