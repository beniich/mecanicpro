<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MecaPro</title>
    <base href="/" />
    
    <!-- Optimisations de préchargement pour les polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#c4c6cf",
              "outline": "#9f8e7a",
              "on-primary-container": "#644000",
              "inverse-primary": "#835500",
              "surface-container-lowest": "#0c0e12",
              "surface-bright": "#37393e",
              "on-secondary-container": "#4d1900",
              "on-background": "#e2e2e8",
              "background": "#111318",
              "on-primary": "#452b00",
              "error": "#ffb4ab",
              "secondary-fixed-dim": "#ffb596",
              "on-tertiary-fixed": "#191c22",
              "surface-container-low": "#1a1c20",
              "surface-container": "#1e2024",
              "inverse-surface": "#e2e2e8",
              "on-primary-fixed": "#291800",
              "tertiary-fixed": "#e0e2eb",
              "surface-container-high": "#282a2e",
              "surface": "#111318",
              "primary-fixed": "#ffddb4",
              "surface-container-highest": "#333539",
              "on-secondary-fixed-variant": "#7c2e00",
              "on-surface": "#e2e2e8",
              "outline-variant": "#524534",
              "primary-fixed-dim": "#ffb955",
              "on-secondary": "#581e00",
              "tertiary": "#d0d2db",
              "surface-variant": "#333539",
              "on-tertiary-container": "#45474f",
              "on-surface-variant": "#d7c3ae",
              "primary": "#ffc880",
              "surface-dim": "#111318",
              "secondary-fixed": "#ffdbcd",
              "on-error": "#690005",
              "on-tertiary": "#2d3037",
              "secondary": "#ffb596",
              "on-tertiary-fixed-variant": "#44474e",
              "tertiary-container": "#b4b6bf",
              "on-secondary-fixed": "#360f00",
              "on-error-container": "#ffdad6",
              "inverse-on-surface": "#2f3035",
              "secondary-container": "#f26411",
              "primary-container": "#f5a623",
              "surface-tint": "#ffb955",
              "error-container": "#93000a",
              "on-primary-fixed-variant": "#633f00"
            },
            fontFamily: {
              "headline": ["Bebas Neue"],
              "body": ["DM Sans"],
              "technical": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.75rem", "lg": "1rem", "xl": "1.25rem", "full": "9999px"},
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
        }
        .text-shadow-glow {
            text-shadow: 0 0 12px rgba(245, 166, 35, 0.3);
        }
        .headline-font { font-family: 'Bebas Neue', sans-serif; }
        .technical-font { font-family: 'JetBrains Mono', monospace; }
    </style>
    <link rel="stylesheet" href="css/mecapro.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MecaPro.Blazor.styles.css" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <!-- Écran de chargement ultra-rapide (inline CSS pour rendu immédiat avant téléchargement WASM/Tailwind) -->
        <div style="position: fixed; inset: 0; background-color: #07080a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: 'Bebas Neue', sans-serif; color: #e2e2e8;">
            <div style="width: 60px; height: 60px; border: 4px solid rgba(245, 166, 35, 0.1); border-left-color: #f5a623; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 2rem;"></div>
            <h1 style="font-size: 3rem; font-weight: bold; letter-spacing: 0.2em; color: #f5a623; margin: 0; text-transform: uppercase;">MECAPRO</h1>
            <p style="font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: #9f8e7a; letter-spacing: 0.1em; margin-top: 0.5rem; text-transform: uppercase;">Chargement du système logiciel...</p>
            <style>
                @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            </style>
        </div>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>
</html>
