services:
  # ═══════════════════════════════════════════════════════════════════════════
  #  INFRASTRUCTURE SERVICES
  # ═══════════════════════════════════════════════════════════════════════════
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mecapro-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword!123
    ports:
      - "1433:1433"

  redis:
    image: redis:alpine
    container_name: mecapro-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mecapro-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  seq:
    image: datalust/seq:latest
    container_name: mecapro-logs
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:5341"
      - "8081:80"

  # ═══════════════════════════════════════════════════════════════════════════
  #  MICROSERVICES
  # ═══════════════════════════════════════════════════════════════════════════
  auth-service:
    build:
      context: .
      dockerfile: src/MecaPro.Auth/Dockerfile
    container_name: mecapro-auth
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MecaPro_AuthDb;User Id=sa;Password=YourStrongPassword!123;TrustServerCertificate=True
      - Seq__ServerUrl=http://seq:5341
    ports:
      - "5100:8080"
    depends_on:
      - sqlserver
      - seq

  notification-service:
    build:
      context: .
      dockerfile: src/MecaPro.Notifications/Dockerfile
    container_name: mecapro-notifications
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__RabbitMQ=rabbitmq
      - Seq__ServerUrl=http://seq:5341
    ports:
      - "5201:8080"
    depends_on:
      - rabbitmq
      - seq

  inventory-service:
    build:
      context: .
      dockerfile: src/MecaPro.Inventory/Dockerfile
    container_name: mecapro-inventory
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MecaPro_InventoryDb;User Id=sa;Password=YourStrongPassword!123;TrustServerCertificate=True
      - ConnectionStrings__RabbitMQ=rabbitmq
      - Seq__ServerUrl=http://seq:5341
    ports:
      - "5300:8080"
    depends_on:
      - sqlserver
      - rabbitmq
      - seq

  api-monolith:
    build:
      context: .
      dockerfile: src/MecaPro.API/Dockerfile
    container_name: mecapro-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MecaPro_AppDb;User Id=sa;Password=YourStrongPassword!123;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=rabbitmq
      - Seq__ServerUrl=http://seq:5341
    ports:
      - "5001:8080"
    depends_on:
      - sqlserver
      - redis
      - rabbitmq
      - seq

  gateway:
    build:
      context: .
      dockerfile: src/MecaPro.Gateway/Dockerfile
    container_name: mecapro-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__auth-cluster__Destinations__auth__Address=http://auth-service:8080
      - ReverseProxy__Clusters__notifications-cluster__Destinations__notifications__Address=http://notification-service:8080
      - ReverseProxy__Clusters__inventory-cluster__Destinations__inventory__Address=http://inventory-service:8080
      - ReverseProxy__Clusters__monolith-cluster__Destinations__monolith__Address=http://api-monolith:8080
    ports:
      - "5000:8080"
    depends_on:
      - auth-service
      - notification-service
      - inventory-service
      - api-monolith

  ai-agent:
    build:
      context: ../sub-agent
      dockerfile: Dockerfile
    container_name: mecapro-ai-agent
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - INTERNAL_API_URL=http://api-monolith:8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      - redis
      - api-monolith

